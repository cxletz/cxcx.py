<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <style>
        .button-container {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }
        .button-container button, .button-container a {
            width: auto;
            padding: 8px 20px;
        }

        /* Mobile responsive styles */
        @media (max-width: 767.98px) {
            .main-container {
                margin: 15px !important;
            }

            .button-container {
                flex-direction: column;
                gap: 8px;
            }

            .button-container button,
            .button-container a {
                width: 100%;
                text-align: center;
            }
        }
    </style>
    <title>PYTHON - Exam Results</title>
    <link rel="stylesheet" href="exam.css">
</head>
<body>
    <div style="margin: 50px;" class="main-container">
        <div class="container-fluid">
            <h2>ITS Certification: Python - Exam Results</h2>
            <div class="d-flex flex-column flex-sm-row align-items-start align-items-sm-center gap-2 gap-sm-2 mb-3">
                <a href="main.html" class="btn btn-success" role="button">Logout</a>
                <button type="button" id="retake-btn-top" class="btn btn-warning">Retake Exam</button>
            </div>
            <hr>
            <div id="exam-results-panel" class="exam-results-panel"></div>
            <div class="button-container">
                <button type="button" id="retake-btn" class="btn btn-warning">Retake Exam</button>
                <a href="main.html" id="back-btn" class="btn btn-info">Back to Main</a>
            </div>
        </div>
    </div>
    <script src="exam-results.js"></script>
</body>
</html>
